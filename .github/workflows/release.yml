name: release

# Tag a release (`git tag v0.1.0 && git push origin v0.1.0`) to validate, build,
# and publish to PyPI via Trusted Publishing (OIDC) -- no API token in the repo.
# One-time setup: add a pending publisher at
# https://pypi.org/manage/account/publishing/ (owner altikva, repo spero,
# workflow release.yml, environment pypi).

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tag must match the package version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${REF_NAME#v}"
          pkg="$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg"
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Lint, type-check, test
        run: |
          uv sync --locked --all-extras
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .
          uv run --no-sync mypy
          uv run --no-sync pytest

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - name: Smoke-test the built wheel
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/spero version
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Trusted Publishing
      contents: write # create the GitHub Release
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: gh release create "$REF_NAME" dist/* --title "$REF_NAME" --generate-notes
