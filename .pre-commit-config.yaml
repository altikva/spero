# Run on every commit: `uv run pre-commit install` once to wire the git hook.
# `uv run pre-commit run --all-files` to check the whole tree on demand.
repos:
  # Secret scanning — keep credentials out of history (modeled on a4c-gke,
  # but the portable upstream hook rather than a vendored binary).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  # Lint + format via the project's own pinned ruff (uv run), so the hook can
  # never disagree with CI or the version in pyproject.toml.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
