# Spero policy — declares what to supervise and how to heal it.
# Replaces the old cluster_config.json. `frozen` is the global action freeze.
version: 1
frozen: false

targets:
  - name: nginx
    provider: local
    probe:
      type: systemd
      params:
        unit: nginx.service
      interval: 30
    remediations:
      - type: restart
        params:
          unit: nginx.service
        # low-risk action runs automatically, high-risk needs a human (gated)
        autonomy: gated
        max_attempts: 2

  - name: data-disk
    provider: ssh:ops@web-01
    probe:
      type: disk
      params:
        path: /data
        threshold_pct: 90
      interval: 300
    remediations:
      - type: rotate
        params:
          path: /data/logs
          keep_days: 21
        # destructive (deletes files): must be gated, never auto
        autonomy: gated

  - name: postgres
    provider: ssh:ops@db-01
    probe:
      type: postgres
      params:
        host: localhost
        port: 5432
      interval: 30
    remediations:
      - type: restart
        params:
          unit: postgresql.service
        autonomy: gated
        max_attempts: 3

  - name: api-deployment
    provider: k8s:prod/api
    probe:
      type: deployment
      params:
        name: api
      interval: 30
    remediations:
      # gentle first (rollout restart), escalate to recreating pods if it persists
      - type: rollout-restart
        params:
          deployment: api
        autonomy: gated
        max_attempts: 2
      - type: delete-pod
        params:
          selector: app=api
        autonomy: gated
        max_attempts: 5
