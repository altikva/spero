apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Supervise-only base: read access plus an always-on Deployment. Apply this for
# a watch-only supervisor. To let spero act, use overlays/acting instead.
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - configmap.yaml
  - deployment.yaml
  - networkpolicy.yaml
