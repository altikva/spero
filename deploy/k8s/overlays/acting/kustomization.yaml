apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Acting overlay: the read-only base PLUS the mutating ClusterRole/binding that
# let spero actually remediate. Apply this when you want spero to act, not just
# observe.
resources:
  - ../../base
  - clusterrole.yaml
  - clusterrolebinding.yaml
